<!DOCTYPE html>
<head>
    <title id="title">Login</title>
    <link rel="icon" type="image/x-icon" href="images/icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Mulish:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="CSS/desktop.css">
</head>
<body>



    <div id="off">

        <div id="login">
            <h3 id="clock"></h3>
            <form id="pH" onsubmit="checkPH(this.querySelector('input').value);return false;">
                <img src="../OS/images/user.png">
                <p>Admin User</p>
                <input id="pass" type="password" placeholder="Hint: it's 123">
            </form>
        </div>

    </div>
    <div id="main">
        <div id="bg"></div>
    <div id="toolbar">
        <div id="abt" class="menu-button">About</div>
        <div class="menu-button" id="pow">Power</div>
    </div>

    <div id="kill">
        <img src="images/power.png"> <p id="time">Shutting Down in 5 Seconds. Press Any Key to Cancel.</p>
    </div>
    </div>
</body>
<script>
    document.addEventListener("mousedown", () => {
        document.documentElement.requestFullscreen();
    });
    document.addEventListener("keypress", () => {
        document.documentElement.requestFullscreen();
    });
    const grd = document.getElementById("bg");
    const space = 20;
    const activeDots = new Set();
    const griDots = [];
    let lastDots = [];

    function makeGrid() {
        grd.innerHTML = "";
        griDots.length = 0;

        const columns = Math.ceil(window.innerWidth / space) + 5;
        const rows = Math.ceil(window.innerHeight / space) + 5;


        for (let row = 0; row < rows; row++) {
            griDots[row] = [];

            for (let col = 0; col < columns; col++) {
                const dot = document.createElement("div");
                dot.classList.add("dot");

                dot.style.position = "absolute";
                dot.dataset.x = col * space;
                dot.dataset.y = row * space;
                dot.style.transform = `translate(${col * space}px, ${row * space}px) scale(1)`;
                grd.appendChild(dot);

                griDots[row][col] = {
                    el: dot,
                    x: col * space,
                    y: row * space,
            };
        }
        }
    }
    // ChatGPT helped a lot with this
    function upDot(mX, mY) {

// RESET ONLY PREVIOUS DOTS
for (let i = 0; i < lastDots.length; i++) {
    const dot = lastDots[i];
    dot.el.style.transform = `translate(${dot.x}px, ${dot.y}px) scale(1)`;
    dot.el.style.backgroundColor = "rgba(255,255,255,0)";
    dot.el.style.boxShadow = "none";
}

lastDots = [];

const radius = 80;
const cellRadius = 10; 

const mouseCol = Math.floor(mX / space);
const mouseRow = Math.floor(mY / space);

for (let row = mouseRow - cellRadius; row <= mouseRow + cellRadius; row++) {
    for (let col = mouseCol - cellRadius; col <= mouseCol + cellRadius; col++) {

        if (!griDots[row] || !griDots[row][col]) continue;

        const dot = griDots[row][col];

        const dx = mX - dot.x;
        const dy = mY - dot.y;

        const dist = Math.hypot(dx, dy);

        if (dist < radius) {
            const streng = 1 - dist / radius;

            dot.el.style.transform = `translate(${dot.x}px, ${dot.y}px) scale(${1 + streng * 0.4})`;

            dot.el.style.backgroundColor = `rgba(100,200,255,${streng})`;

            dot.el.style.boxShadow = `0 0 ${12 * streng}px rgba(100,200,255,0.8)`; 

            lastDots.push(dot);
        }
    }
}
}

    document.addEventListener("DOMContentLoaded", function() {
        let mouseX = 0;
let mouseY = 0;
let pending = false;

window.addEventListener("mousemove", e => {
    mouseX = e.clientX;
    mouseY = e.clientY;

    if (!pending) {
        pending = true;

        requestAnimationFrame(() => {
            upDot(mouseX, mouseY);
            pending = false;
        });
    }
});
    })
    window.addEventListener("resize",makeGrid);
    makeGrid();

   






    function checkPH(e) {
        const inp = document.getElementById("pass")
        inp.value = "";
        inp.blur();
        inp.style.cursor = "wait";
        inp.disabled = true;
        inp.style.backgroundColor = "rgba(133, 133, 133, 0.767)";
        inp.style.pointerEvents = "none";
        if (e !== "123") {
            inp.classList.add("shake");
            setTimeout(() => {
                inp.classList.remove("shake");
                inp.disabled = false;
                inp.style.pointerEvents = "auto";
                inp.style.cursor = "auto";
            },600);
        }
        else {
            setTimeout(() => {
                document.getElementById("off").style.backgroundImage = "none";
                document.getElementById("off").style.backgroundColor = "black";
                setTimeout(() => {
                    document.getElementById("login").remove();
                    document.getElementById("title").innerHTML = "Desktop"
                },350)
                setTimeout(() => {
                    document.getElementById("off").style.opacity = "0";
                },700)
                setTimeout(() => {
                    document.getElementById("main").style.display = "block";
                },1200)
        },600)
        }
    }



    updateClock();
    function updateClock() {
        const out = document.getElementById("clock");
        let dat = new Date();
        out.textContent = dat.getHours() + ":" + dat.getMinutes();
        if (dat.getMinutes() <= 9) {
            out.textContent = dat.getHours() + ":0" + dat.getMinutes();
        }
        setTimeout(updateClock,1000);
    }



    let shutting = false;
    document.addEventListener("DOMContentLoaded", function () {
        document.getElementById('pow').addEventListener("click",power)
        function power() {
            document.getElementById("kill").style.display = "flex";
            shutting = true;
            window.addEventListener("keydown", function() {
                document.getElementById("time").textContent = "Shutting Down in 5 Seconds. Press Any Key to Cancel.";
                document.getElementById("kill").style.display = "none";
                document.getElementById("off").style.pointerEvents = "none";
                document.getElementById("off").style.opacity = "0";
                shutting = false;
                document.getElementById("pow").style.cursor = "not-allowed";
                document.getElementById("pow").removeEventListener("click",power);
                setTimeout(function(){
                    document.getElementById("pow").addEventListener("click",power);
                    document.getElementById("pow").style.cursor = "pointer";
                }, 5000)
                return;
            })
            setTimeout(function(){
                if (shutting){
                document.getElementById("time").textContent = "Shutting Down in 4 Seconds. Press Any Key to Cancel.";
                }
            }, 1000);
            setTimeout(function(){
                if (shutting){
                document.getElementById("time").textContent = "Shutting Down in 3 Seconds. Press Any Key to Cancel.";
                }
            }, 2000);
            setTimeout(function(){
                if (shutting){
                document.getElementById("time").textContent = "Shutting Down in 2 Seconds. Press Any Key to Cancel.";
                }
            }, 3000);
            setTimeout(function(){
                if (shutting){
                document.getElementById("time").textContent = "Shutting Down in 1 Seconds. Press Any Key to Cancel.";
                }
            }, 4000);
            setTimeout(function(){
                if (shutting){
                document.getElementById("off").style.pointerEvents = "all";
                document.getElementById("off").style.opacity = "1";
                }
            }, 4500);
            setTimeout(function(){
                if (shutting){
                window.close();
                }
            }, 5000);
        };
        let abtOpen = false;
        const abtton = document.getElementById('abt');

        abtton.addEventListener('click', () => {
            if (!abtOpen){
                open('384','504','Apps/about.html','about');
                abtOpen = true;
            }});
        
        function dragibus(w,i,g) {
        /* dragging (w3Schools and Gemini) */
    var e = w;
    var interactive = i;
    var grabBar = g;
    var pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
    drag(g);
    function drag(ez) {
        ez.onmousedown = dragClick;
    }
    function dragClick(el) {
        el = el || window.event;
        el.preventDefault();
        pos3 = el.clientX;
        pos4 = el.clientY;
        var interactives = document.querySelectorAll(".cont");
        interactives.forEach((x) => {
            x.style.pointerEvents = "none";
        });
        grabBar.style.cursor = "grabbing";
        document.addEventListener('mouseup', closeDrag);
        document.addEventListener('mousemove', drage);
    }
    function drage(ex) {
        ex = ex || window.event;
        ex.preventDefault();
        pos1 = pos3 - ex.clientX;
        pos2 = pos4 - ex.clientY;
        pos3 = ex.clientX;
        pos4 = ex.clientY;
        e.style.top = (e.offsetTop - pos2) + "px";
        e.style.left = (e.offsetLeft - pos1) + "px";
    }
    function closeDrag() {
        var interactives = document.querySelectorAll(".cont");
        interactives.forEach((x) => {
            x.style.pointerEvents = "auto";
        });

        interactive.style.pointerEvents = "auto";
        grabBar.style.cursor = "grab";
        document.removeEventListener('mouseup', closeDrag);
        document.removeEventListener('mousemove', drage);
    }
    document.querySelectorAll('*').forEach(element => {
        element.setAttribute('draggable', 'false');
    });
    document.addEventListener('dragstart',(e)=> {
        e.preventDefault();
    })
}
    /* opening and closing windows */

    function open(wid,hi,app,nom) {
        const wind = document.createElement('div');
        wind.setAttribute("class","window");

        const bah = document.createElement('div');
        bah.setAttribute("class","bar");

        const shut = document.createElement('div');
        shut.setAttribute("class","close");
        
        const frame = document.createElement('iframe');
        frame.setAttribute("class","cont");
        frame.setAttribute("width", wid );
        frame.setAttribute("height", hi );
        frame.setAttribute("src", app );
        frame.setAttribute("title", nom );

        wind.appendChild(bah);
        bah.appendChild(shut);
        wind.appendChild(frame);

        shut.addEventListener("click", () => quit(wind));
        document.body.appendChild(wind);
        dragibus(wind,frame,bah);
    }

    function quit(w) {
        w.remove();
        abtOpen = false;
    }

});
</script>
